organisations:
  "Ville d'Alma SPECTACLES - AA - AA":
    Event:
      - Utilise souvent RepresentationTypeId pour des spectacles locaux, compatible avec chanson et humour.
      - TicketLimitNumber typiquement élevé pour accommoder les familles, autour de 500-1000 billets.
    OwnerPOS:
      - IsInactive généralement False pour les points de vente actifs dans la région Saguenay.
      - Cohérence géographique avec Province=QC et TimeZoneID=1.
    RightToSellAndFees:
      - Frais homogènes entre POS, avec Fee1 autour de 2.5 pour Internet et Centrale.
      - IsSaleAutorized=True pour les POS clés comme Internet et administration.

  "Salle André-Mathieu - SAM - SAM":
    Event:
      - Noms cohérents avec ArtistName pour des événements musicaux, évitant variations mineures.
      - DisplayOnTheInternet=True pour la plupart des événements en vente active.
    OwnerPOS:
      - Configuration financière avec GLAccountID non nuls pour les comptes actifs.
      - Région cohérente avec Québec, sans écarts flagrants en timezone.
    RightToSellAndFees:
      - Répartition des frais stable, avec IncomeInternal souvent majoritaire pour POS internes.
      - PriceGroupsForPOS similaires pour POS partenaires, couvrant tous les groupes de prix standard.

  "Comité des spectacles Dolbeau-Mistassini 2013 - DM - DM":
    Event:
      - ActivityTypeID souvent vide, conforme aux références locales.
      - SupportETicketShipping=False pour les événements historiques.
    OwnerPOS:
      - IsInactive=False, avec nom clair et région Saguenay-Lac-St-Jean.
      - GLAccountID configurés pour les taxes et revenus, évitant valeurs nulles.
    RightToSellAndFees:
      - Fee1 plus bas pour OwnerPOS principal, autour de 1.75.
      - IsSaleAutorized=True pour tous les POS actifs, sans désactivation suspecte.

  "Dinner in the Sky - DITS - DITS":
    Event:
      - Type de représentation adapté à des événements expérientiels, non standards comme chanson.
      - IsTaxableByDefault=True, aligné avec des références événementielles.
    OwnerPOS:
      - Cohérence géographique avec événements au Québec, TimeZoneID=1.
      - FiscalYear configuré pour des événements saisonniers.
    RightToSellAndFees:
      - Frais nuls rares, généralement Fee1 et Fee2 non zéros pour tous POS.
      - Répartition des revenus favorisant IncomeForPOS pour partenaires externes.

  "Les Croisières du Fjord - CFJORD - CFJORD":
    Event:
      - Noms internet cohérents avec descriptions pour événements touristiques.
      - IsInSale=True avec IsHistory=False pour croisières actives.
    OwnerPOS:
      - Région Saguenay, avec adresse et phone cohérents.
      - GLExportFormat adapté à des entités touristiques.
    RightToSellAndFees:
      - Cohérence des frais avec événements similaires, Fee1 autour de 2.5-3.0.
      - PriceGroupsForPOS incluant groupes spéciaux pour touristes.

  "Auditorium Dufour (ancien) - AD - AD":
    Event:
      - RepresentationTypeId pour chanson française, cohérent avec références historiques.
      - TicketLimitNumber modéré, comparé à salles similaires.
    OwnerPOS:
      - IsInactive=True pour points de vente archivés, avec GLAccountID nuls.
      - Cohérence avec région Saguenay-Lac-St-Jean.
    RightToSellAndFees:
      - Frais homogènes, avec variations mineures pour POS anciens.
      - IsSaleAutorized=False pour POS obsolètes dans références récentes.

  "Réservatech.net (administration) - RN - RN":
    Event:
      - Utilisé pour administration, avec DisplayOnTheInternet souvent False.
      - SupportMailShipping=True par défaut.
    OwnerPOS:
      - IsInactive=False, avec configuration complète pour tests.
      - TimeZoneID=1 pour cohérence nord-américaine.
    RightToSellAndFees:
      - Fee1 et Fee2 à 2.5 pour simulations administratives.
      - PriceGroupsForPOS étendus pour inclure tous les groupes.

  "Savoy Theatre - SAV - SAV":
    Event:
      - ArtistName cohérent avec type théâtre/humour.
      - IsHistory=True pour événements passés, suspect si en vente.
    OwnerPOS:
      - Région Québec, avec fiscalité configurée.
      - GLAccountID non nuls pour revenus et royalties.
    RightToSellAndFees:
      - Répartition des frais avec IncomeInternal élevé pour théâtre.
      - IsSaleAutorized=True pour Internet et Centrale. 

  "Orchestre Symphonique - OS - OS":
    Event:
      - Type de représentation pour musique classique, cohérent avec références.
      - TicketLimitNumber élevé pour concerts orchestraux.
    OwnerPOS:
      - Cohérence géographique avec Québec, sans écarts.
      - Configuration financière complète pour entités culturelles.
    RightToSellAndFees:
      - Frais bas pour POS internes, autour de 1.75-2.5.
      - PriceGroupsForPOS incluant groupes pour abonnements.

  "Théâtre La Rubrique - RUB - RUB":
    Event:
      - Noms et descriptions cohérents pour théâtre.
      - DisplayOnTheInternet=True avec IsInSale=True.
    OwnerPOS:
      - IsInactive=False, région Saguenay.
      - Timezone cohérente avec événements locaux.
    RightToSellAndFees:
      - Cohérence des frais, Fee1 stable à 2.5.
      - Répartition favorisant IncomeInternal pour théâtre.

  "Festivalma - FVM - FVM":
    Event:
      - ActivityTypeID vide fréquent pour festivals.
      - SupportETicketShipping variable, souvent False pour événements en extérieur.
    OwnerPOS:
      - Région Saguenay-Lac-St-Jean, avec adresse festival.
      - GLAccountID configurés pour événements saisonniers.
    RightToSellAndFees:
      - Frais plus élevés pour festivals, Fee1 autour de 3.0.
      - IsSaleAutorized=True pour multiples POS partenaires.