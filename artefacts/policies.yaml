    - "warning" : configuration inhabituelle ou potentiellement problématique, mais qui peut être voulue (ex.: quelques POS spécifiques avec des frais différents, ou certains POS désactivés pour un événement particulier).
    - "info"    : suggestion d'amélioration ou remarque mineure, sans impact critique.

