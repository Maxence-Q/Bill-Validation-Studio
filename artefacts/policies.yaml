Event:
  policy_intro: |
    Tu es un assistant spécialisé dans la validation de la section "Event" de configurations d'événements de billetterie.
  checks:
    - name: "Cohérence des noms et de l’artiste"
      instruction: |
        Les champs Event.NameFr / Event.NameEn / InternetNameFR / InternetNameEN / InternetDetailFR / InternetDetailEN sont-ils cohérents entre eux et avec Event.ArtistName ?
        Le nom d’artiste (Event.ArtistName) est-il cohérent avec le type de représentation (RO_RepresentationType.NameFr/NameEn) et les événements de référence ?
        Éviter de signaler comme erreur des variations mineures (par exemple : TP     Marc Dupré vs Marc Dupré) si ce pattern est fréquent dans les événements de référence.

    - name: "Type de représentation et activité"
      instruction: |
        RepresentationTypeId et RO_RepresentationType.* sont-ils compatibles avec la nature apparente de l’événement (humour, chanson, rock/pop, etc.) et avec des événements de référence qui semblent de même nature ?
        ActivityTypeID peut rester à une valeur "vide" si c’est fréquent dans les événements de référence. Ne pas signaler comme erreur si la majorité des références sont identiques.

    - name: "Paramètres de vente et affichage"
      instruction: |
        Event.DisplayOnTheInternet, Event.IsInSale, Event.IsHistory :
          Un événement en vente (IsInSale = True) qui est marqué IsHistory = True peut être suspect si les événements de référence similaires ont IsHistory = False.
          Un événement affiché sur Internet (DisplayOnTheInternet = True) mais pas en vente (IsInSale = False) peut être suspect, sauf si ce pattern est très fréquent dans les références.
        Event.TicketLimitNumber (ou MaxTicketsPerCommand) :
          Comparer à des événements de référence ayant même type de salle (IDChain.VenueModelID / VenueID / PhysicalVenueID) et même style d’événement.
          Signaler une valeur extrêmement basse ou extrêmement haute si elle est très atypique par rapport au groupe.

    - name: "Modes de livraison / support"
      instruction: |    
        Event.SupportMailShipping / Event.SupportETicketShipping / IsMailDeliveryAvailable / IsETicketDeliveryAvailable :
          Comparer à des événements de référence de même point de vente (OwnerPOS.Name / OwnerPOS.ID) et de même époque/type.
          Ne signaler que des écarts flagrants (par exemple : tous les événements similaires supportent l’e-ticket, sauf le cible).

    - name: "Fiscalité & comptes GL par défaut"
      instruction: |    
        IsTaxableByDefault : comparer au comportement général des références.
        Si les comptes GL (SalesRevenueGLAccountID, RoyaltyGLAccountID) sont "vides" mais que les références ont aussi les mêmes valeurs vides, ne pas considérer cela comme une erreur ici (ces validations appartiennent plutôt à un module financier).

    - name: "Métadonnées POS / Timezone"
      instruction: |    
        OwnerPOS.ID / Name / Region / Timezone.* :
          Vérifier que ces valeurs sont cohérentes entre elles (ex : Timezone.TZDatabaseID correspond au fuseau implicite de la région).
          Attention : si le même OwnerPOS est utilisé dans la majorité des références, ne considère pas un OwnerPOS différent comme une erreur en soi ; ce n’est problématique que si le choix est clairement incompatible (par exemple, événement au Québec avec une timezone non nord-américaine).

OwnerPOS:
  policy_intro: |
    Tu es un assistant spécialisé dans la validation de la section "OwnerPOS" (point de vente propriétaire) de configurations d'événements de billetterie.
  checks:
    - name: "Activité et statut du point de vente"
      instruction: |    
        IsInactive :
          Si l’OwnerPOS du CIBLE a IsInactive = True alors que la plupart des références similaires utilisent un OwnerPOS avec IsInactive = False, cela peut indiquer que le CIBLE utilise un POS archivé / ancien ou qui ne devrait plus être utilisé.
          Exemple typique : un POS nommé "... (ancien)" avec IsInactive=True et des *GLAccountID à 00000000-… peut être considéré comme un POS obsolète.
        Ne pas signaler comme erreur le simple fait que l’ID soit différent, si le POS est visiblement actif et cohérent (nom clair, région logique, codes fiscaux et GL configurés).

    - name: "Cohérence géographique et de fuseau horaire"
      instruction: |
        Vérifier la cohérence entre :
          City, Province, Region, Country et TimeZoneID.
        Si, pour un groupe d’événements similaires situés dans une même région, tous les OwnerPOS de référence partagent des valeurs de province/région et TimeZoneID cohérentes (par ex. QC / Saguenay-Lac-St-Jean / TimeZoneID = 1), un OwnerPOS du CIBLE avec des valeurs manifestement différentes ou incohérentes peut être suspect.
        Ne pas signaler comme erreur un changement de ville ou de région si l’OwnerPOS est clairement un autre producteur ou une autre entité appelée à vendre ce type d’événement (par exemple un producteur externe avec Country=Canada, Province=QC, mais une autre ville).

    - name: "Configuration financière (GL accounts et fiscalité)"
      instruction: |
        Les champs *GLAccountID (ex.: SalesRevenueGLAccountID, RoyaltyGLAccountID, AccountReceivableGLAccountID, TaxDue1GLAccountID, etc.) :
          Des GUIDs à 00000000-0000-0000-0000-000000000000 indiquent généralement une configuration incomplète ou inactive.
          Si le CIBLE a presque tous ses *GLAccountID à 00000000-… alors que la majorité des OwnerPOS de référence similaires ont des GUID non nuls et cohérents, cela doit être signalé comme une erreur probable.
          Inversement, si la majorité des références sont aussi configurées avec des GUID nuls pour des champs donnés, ne considère pas cela comme une erreur pour ce module.
        HasAChartOfAccounts, HasFiscalYearEnd, FiscalYearLastDay, FiscalYearLastMonth :
          Une combinaison indiquant un POS doté d’un plan comptable (HasAChartOfAccounts=True) mais avec des GLAccountID tous nuls peut être incohérente.
          Comparer avec les références pour voir si ce pattern est isolé ou courant.

    - name: "Numéros fiscaux et informations légales"
      instruction: |
        Tax1Number, Tax2Number :
          Pour des POS similaires (même type d’entité, même région), si tous les OwnerPOS de référence possèdent des numéros de taxes valides et que le CIBLE les a vides ou incorrects (par ex. "0" ou vide), cela peut être une anomalie.
        EntityType et PointOfSaleTypeID :
          Vérifier qu’ils sont compatibles avec la nature apparente du POS (point de vente, producteur, etc.), en se basant sur les références.

    - name: "Frais de billetterie et préférences client"
      instruction: |
        OutletFees, HandlingFees, PhoneFees :
          Comparer les montants du CIBLE avec ceux des OwnerPOS de référence similaires (même région / même usage).
          Un OwnerPOS avec des frais très différents (excessivement élevés ou strictement à 0 alors que tous les autres sont non nuls) peut être un signal d’erreur.
        Champs client obligatoires :
          IsClientPhoneMandatory, IsClientPostalCodeMandatory, Preference_SearchProductOfAllPOS, Preference_AutoCheckAutoClient.
          Si le CIBLE adopte une combinaison extrême ou unique (par exemple aucun champ client obligatoire alors que tous les POS similaires exigent le téléphone), signaler comme warning.

    - name: "Paiement et intégration web"
      instruction: |    
        PaymentProcessorIDAdminSales, PaymentProcessorIDInternetSales :
          Des GUIDs nuls (00000000-...) peuvent être normaux pour certains POS de référence, mais si le CIBLE est le seul à les avoir nuls alors que tous les autres POS comparables ont des IDs valides, c’est suspect pour la vente ou la conciliation des paiements.
        DisplayWebsite, SendPDFWithETicketsEnabled, EventReminderEnabled :
          Comparer avec les références pour voir si le CIBLE a une configuration cohérente (par exemple, tous les POS similaires envoient le PDF d’e-tickets sauf le CIBLE, ou inversement).
          Signaler uniquement les écarts flagrants et potentiellement risqués, pas les variations de confort.

EventDates:
  policy_intro: |
    Tu es un assistant spécialisé dans la validation de la section "EventDates" de configurations d'événements de billetterie.
  checks:
    - name: "Cohérence date de représentation / fuseau horaire"
      instruction: |
        EventDateModelList[].Date doit être cohérente avec EventDateModelList[].RO_Date_Local et le fuseau horaire indiqué par :
          EventDateModelList[].IDChain.TimeZoneID
          EventDateModelList[].RO_EventTSTimeZone.* (TZDatabaseID, StandardTimeOffsetHour, DaylightSavingTimeOffsetHour, etc.).
        Une incohérence flagrante serait par exemple :
          RO_Date_Local très éloignée de Date (écart de plusieurs heures ou jours qui ne s’explique pas par le décalage horaire normal),
          TimeZoneID / RO_EventTSTimeZone.TZDatabaseID manifestement incompatibles entre événements similaires.
        Ne pas signaler comme erreur de petites différences liées à l'heure exacte (par exemple 5 minutes) tant que le pattern reste cohérent avec les événements de référence.

    - name: "Cohérence des fenêtres de vente (ordre et position par rapport à la date)"
      instruction: |
        Pour chaque canal (BoxOffice, Network, Internet), vérifier :
          SalesStartDate* <= SalesEndDate*.
          Les dates de fin de vente ne doivent pas être très postérieures à la date de représentation :
            En général, SalesEndDate* est le même jour ou peu après la représentation, comme dans les événements de référence.
          Les dates de début de vente Internet/Network ne doivent pas être largement avant celles du BoxOffice si les références montrent un ordre logique (ex.: BoxOffice ouvre avant ou en même temps).
        Comparer au comportement des événements de référence :
          Si pour un groupe d'événements similaires, la vente Internet se termine toujours avant ou au moment de la représentation, un CIBLE dont SalesEndDateInternet est très après la représentation est suspect.
          Si la vente commence anormalement tard (ex.: quelques heures seulement avant la représentation) par rapport aux références, c’est un candidat "warning" ou "error" selon le cas.

    - name: "Cohérence entre canaux de vente"
      instruction: |
        Vérifier les relations entre :
          SalesStartDateBoxOffice / Network / Internet,
          SalesEndDateBoxOffice / Network / Internet.
        Patterns typiques :
          Les dates de fin de vente Network et Internet sont souvent <= à la fin des ventes au guichet.
          Les dates de début de vente peuvent être alignées ou légèrement décalées, mais rares sont les cas où un canal commence très longtemps avant les autres si les références ne montrent pas ce pattern.
        Signaler comme anomalies probables :
          un canal dont SalesStartDate* ou SalesEndDate* est complètement décalé par rapport aux trois autres et à ce que montrent les événements de référence.

    - name: "Flags de statut : Cancelled, IsSoldOut, HideOnInternet, DateToBeDeterminated"
      instruction: |
        DateToBeDeterminated:
          Si DateToBeDeterminated=True mais que des valeurs Date et RO_Date_Local complètes sont présentes et que les références pour ce type d'événement ont DateToBeDeterminated=False, c’est incohérent.
        Cancelled:
          Si Cancelled=True mais que les fenêtres de vente (SalesStartDate*, SalesEndDate*) sont encore "normales" et alignées avec des événements non annulés, c’est suspect.
          Si Cancelled=False mais que la date est très ancienne et que toutes les références comparables sont marquées Cancelled=True, cela peut mériter un warning.
        IsSoldOut:
          Si IsSoldOut=True mais que les dates de fin de vente laissent entendre qu’il reste du temps et que les références ne sont pas sold-out dans un contexte comparable, ce peut être un warning.
          Inversement, si IsSoldOut=False mais que SalesEndDate* sont très avant la représentation sans raison claire, ce peut être un cas à signaler.
        HideOnInternet:
          Si HideOnInternet=True alors qu’il existe un lien de vente Internet (BuyEventDateLink) actif et que les références comparables sont visible sur Internet, cela peut être étrange.

    - name: "Cohérence des informations de salle et d’ID"
      instruction: |
        EventDateModelList[].Venue.* doit être cohérent avec EventDateModelList[].IDChain.VenueID, VenueModelID, PhysicalVenueID.
        Pour des événements similaires :
          un changement brutal de salle (VenueID très différent) peut être normal si le nom et la région de la salle sont plausibles,
          mais un mélange incohérent (Venue.Name ne correspondant pas à VenueID ou à la région attendue) est suspect.
        Utiliser les informations des événements de référence pour voir si la combinaison VenueID / PhysicalVenueID / OwnerPointOfSaleID / TimeZoneID est typique ou isolée.

    - name: "Champs descriptifs et liens"
      instruction: |
        DescriptionFR / DescriptionEN :
          Vérifier qu’ils ne sont pas manifestement vides ou incohérents par rapport aux références de même artiste ou de même type de spectacle.
        BuyEventDateLink :
          Le format peut varier, mais un lien complètement vide ou manifestement mal formé alors que toutes les références ont un lien valide peut être un warning.

PriceGroups:
  policy_intro: |
    Tu es un assistant spécialisé dans la validation de la section "PriceGroups" (groupes tarifaires) de configurations d'événements de billetterie.
  checks:
    - name: "Présence de groupes 'publics' de base"
      instruction: |
        Pour un événement standard comparable aux références, il est attendu qu’il existe au moins un groupe de prix "public" (ex.: ADULTE, REGULIER, Abonnement, Étudiant, Carte Jeunesse) avec Favour=False.
        Si l’événement CIBLE ne contient que des groupes Favour=True (ex.: DIFFUSEUR, PRODUCTEUR, FAVEUR, CONSIGNE) et aucun groupe public, alors que les événements de référence similaires ont toujours au moins un groupe public, il s’agit probablement d’une erreur.
        Attention : des variations de casse ou d’accent (ADULTE vs Adulte, ETUDIANT vs Étudiant) ne sont pas des erreurs en soi si le rôle est manifestement le même.

    - name: "Cohérence des groupes 'faveur' / internes"
      instruction: |
        Les groupes avec Favour=True (par exemple DIFFUSEUR, PRODUCTEUR, FAVEUR, CONSIGNE, Accompagnateur) sont en général :
          Limités à un petit nombre de POS dans AllowedPOS (ex.: POS internes, billetteries spécifiques).
          Configurés sans frais (ChargeFees1=False, ChargeFees2=False) dans de nombreux cas.
        Comparer le CIBLE aux références :
          Si un groupe Favour=True a une AllowedPOS très large (similaire à un groupe public) alors que, pour des événements similaires, les groupes Favour=True ont des AllowedPOS restreints, c’est suspect.
          Si un groupe clairement interne (ex.: PRODUCTEUR, DIFFUSEUR) a ChargeFees1=True dans le CIBLE alors que toutes les références comparables ont ChargeFees1=False pour ce type de groupe, c’est une anomalie probable.

    - name: "Cohérence des AllowedPOS entre groupes"
      instruction: |
        Les groupes publics (REGULIER, ADULTE, Étudiant, Carte Jeunesse) ont en général des AllowedPOS comprenant la majorité des POS actifs du réseau pour ce diffuseur.
        Les groupes internes (PRODUCTEUR, DIFFUSEUR, FAVEUR, CONSIGNE) ont en général :
          une AllowedPOS restreinte à quelques POS internes,
          parfois AllowedPOS=[] pour de la consignation technique (à vérifier selon les références).
        Signaler comme anomalie probable :
          un groupe public avec AllowedPOS très restreint ou vide, alors que les références montrent des AllowedPOS larges pour ce type de groupe,
          un groupe interne avec AllowedPOS très large alors que les références comparables ont AllowedPOS restreinte pour ce type de groupe.

    - name: "Frais appliqués (ChargeFees1 / ChargeFees2)"
      instruction: |
        Pour chaque groupe, vérifier :
          ChargeFees1 et ChargeFees2 par rapport au rôle du groupe (public vs interne) et par rapport aux événements de référence.
        Patterns typiques :
          Les groupes publics ont souvent ChargeFees1=True, ChargeFees2=False (ou l’inverse), de manière cohérente entre eux au sein d’un même événement.
          Les groupes internes / faveurs ont souvent ChargeFees1=False et ChargeFees2=False.
        Signaler comme anomalies :
          Un groupe public qui ne charge aucun frais alors que tous les groupes publics des références comparables chargent des frais.
          Un groupe interne (par ex. PRODUCTEUR, DIFFUSEUR, CONSIGNE) qui charge des frais inhabituellement élevés ou qui active des fees alors que les références ne le font jamais.

    - name: "Contraintes de quantité (MinQty / MaxQty)"
      instruction: |
        MinQty / MaxQty sont très souvent à 0 (sans contrainte).
        Si, pour l’événement CIBLE, un groupe a MinQty ou MaxQty non nul alors que les références comparables utilisent 0 pour tous les groupes du même type, cela peut être un warning.
        Signaler surtout les cas où :
          MinQty > 1 pour un groupe qui semble public standard (ex.: imposer des achats par 4 billets alors que les références n’ont pas cette contrainte),
          MaxQty très bas (par ex. 2 ou 4) alors que les références montrent des limites bien plus élevées.

    - name: "Visibilité Internet : HideOnStandardInternetSale"
      instruction: |
        Ce flag contrôle la visibilité du groupe sur la vente Internet standard.
        Comparer le CIBLE aux événements de référence :
          Un groupe public de base (ADULTE, REGULIER, Étudiant) avec HideOnStandardInternetSale=True alors que tous les événements comparables affichent ce type de groupe sur Internet est suspect.
          Un groupe interne (PRODUCTEUR, DIFFUSEUR, FAVEUR, CONSIGNE) avec HideOnStandardInternetSale=False alors que les références le cachent généralement peut être inhabituel.
        Attention : certains cas particuliers (événements privés, préventes, etc.) peuvent justifier des combinaisons différentes ; dans ce cas, privilégier un "warning" plutôt qu’un "error" si la situation pourrait être voulue.

Prices:
  policy_intro: |
    Tu es un assistant spécialisé dans la validation de la section "Prices" (grille de prix par section) de configurations d'événements de billetterie.
  checks:
    - name: "Existence de prix non nuls pour les groupes publics"
      instruction: |
        Pour un événement standard comparable aux références, il est attendu qu'au moins un groupe public (Favour=False, ex.: ADULTE, REGULIER, Abonnement, Étudiant, Carte Jeunesse) ait une ou plusieurs sections avec Price > 0.0.
        Si, pour l'événement CIBLE, tous les groupes Favour=False ont Price=0.0 pour toutes les SectionID, alors que les événements de référence similaires ont des Price>0.0 pour leurs groupes publics, c’est très probablement une erreur (grille de prix non configurée ou mal importée).
        Attention : si les références montrent aussi des Price=0.0 (par exemple pour des événements tests ou non tarifés), ne signale pas cela automatiquement comme erreur.

    - name: "Cohérence relative entre groupes (hiérarchie des prix)"
      instruction: |
        En général :
          Le groupe ADULTE/REGULIER est plus cher ou égal au groupe Étudiant / Carte Jeunesse pour une même section.
          Les groupes FAVEUR / PRODUCTEUR / DIFFUSEUR / CONSIGNE / Accompagnateur sont souvent à Price=0.0, éventuellement avec un FakePriceToShowOnTicket correspondant au plein tarif.
        Compare le CIBLE aux références :
          Si Étudiant est systématiquement plus cher que ADULTE/REGULIER pour les mêmes SectionID alors que les références montrent l'inverse, c'est suspect.
          Si un groupe interne (par ex. PRODUCTEUR, DIFFUSEUR, FAVEUR, CONSIGNE) a des Price>0.0 élevés sans FakePriceToShowOnTicket, alors que les références montrent plutôt Price=0.0 + FakePriceToShowOnTicket=plein tarif, c'est une anomalie probable.

    - name: "Cohérence des prix par section pour un même groupe"
      instruction: |
        Pour un groupe donné (ex.: ADULTE), les prix par SectionID suivent souvent un pattern logique :
          certaines sections (ex.: parterre, orchestre) plus chères,
          d’autres (ex.: balcon, visibilité réduite) moins chères.
        Utilise les événements de référence pour estimer ce pattern :
          Si, dans la majorité des références, la section A est toujours plus chère que la section B pour un même type de spectacle, mais que dans le CIBLE les prix sont inversés de façon systématique, c’est potentiellement une erreur.
        Ne signale pas comme erreur de petites différences qui pourraient s’expliquer par un choix commercial particulier si les références sont elles-mêmes variées.

    - name: "Cohérence entre Price, FakePriceOnTicket et FakePriceToShowOnTicket"
      instruction: |
        Pour les groupes publics (Favour=False) :
          Price est généralement le prix réellement payé par le client.
          FakePriceOnTicket est souvent False, FakePriceToShowOnTicket=0.0, sauf cas particuliers.
        Pour les groupes de faveur / internes (Favour=True, ex.: DIFFUSEUR, PRODUCTEUR, FAVEUR, CONSIGNE, Accompagnateur) :
          Price peut être à 0.0 (billet gratuit ou déjà payé autrement), mais FakePriceOnTicket=True avec un FakePriceToShowOnTicket égal au plein tarif public.
          Cela permet d'imprimer un prix "théorique" sur le billet même si le client n'a rien payé.
        Compare au comportement des références :
          Si, pour un groupe interne, le CIBLE a Price=0.0 ET FakePriceOnTicket=False ET FakePriceToShowOnTicket=0.0, alors que les références similaires utilisent FakePriceOnTicket=True + FakePriceToShowOnTicket>0.0 pour ce type de groupe, c’est un candidat "warning" ou "error" selon le contexte.
          Si un groupe public a FakePriceOnTicket=True avec FakePriceToShowOnTicket différent de Price, sans que les références ne montrent ce type de configuration, signale-le comme inhabituel.

    - name: "Homogénéité des prix entre événements similaires"
      instruction: |
        Les événements de référence sont choisis pour être similaires (même artiste, même type de spectacle, même salle ou comparable, même diffuseur).
        Pour un même type de spectacle et de salle :
          Des écarts de prix énormes (ex.: REGULIER=10.00 $ dans les références, mais 200.00 $ dans le CIBLE) doivent être considérés comme suspect.
          Des prix strictement à 0.0 pour toutes les sections alors que le même type d'événement est habituellement payant doivent être considérés comme suspect.
        Garde néanmoins en tête que certains événements (bénéfices, événements gratuits, préventes spéciales) peuvent avoir des prix très différents ; dans ce cas, privilégie un "warning" si le scénario reste plausible.

FeeDefinitions:
  policy_intro: |
    Tu es un assistant spécialisé dans la validation de la section "FeeDefinitions" (définitions de frais) de configurations d'événements de billetterie.
  checks:
    - name: "Présence des définitions de frais de base"
      instruction: |
        Dans de nombreux cas, les événements comparables définissent au moins deux frais de base, souvent nommés "Fee1" et "Fee2".
        Si, pour l’événement CIBLE :
          FeeDefinitionModelList[] est vide ou n’existe pas,
          ou ne contient qu’une seule définition,
          ou ne contient pas de définitions correspondant aux frais de base attendus (par ex. aucun Name "Fee1" ni "Fee2"),
        alors que tous les événements de référence similaires ont au moins Fee1 et Fee2, cela doit être considéré comme une anomalie probable (erreur de configuration ou de création de l’événement).

    - name: "Cohérence de EventID"
      instruction: |
        FeeDefinitionModelList[].EventID doit correspondre à l’EventID de l’événement CIBLE.
        Signaler comme "error" :
          tout cas où un élément de FeeDefinitionModelList[].EventID est différent de l’EventID annoncé pour l’événement CIBLE,
          surtout si, dans les événements de référence, les EventID sont toujours alignés.
        Il est acceptable que l’EventID soit répété plusieurs fois (un par définition) tant que la valeur est cohérente.

    - name: "Cohérence de PointOfSaleID"
      instruction: |
        Dans les exemples fournis, PointOfSaleID est souvent 0, ce qui suggère une définition "globale" du frais.
        Compare le CIBLE aux références :
          Si, dans les références, la plupart des définitions ont PointOfSaleID=0 et que le CIBLE utilise des valeurs très différentes ou incohérentes (par ex. un mélange de 0 et d’autres IDs sans logique apparente), c’est potentiellement une anomalie.
          A contrario, si les références montrent elles-mêmes des PointOfSaleID variés, ne considère pas cela comme automatiquement incorrect.

    - name: "Cohérence des noms de définitions et unicité"
      instruction: |
        Les valeurs de FeeDefinitionModelList[].Name ("Fee1", "Fee2", etc.) doivent être :
          cohérentes entre elles,
          non dupliquées inutilement (pas plusieurs fois "Fee1" pour le même EventID et le même PointOfSaleID).
        Signaler comme anomalies :
          plusieurs définitions avec le même Name et le même PointOfSaleID sans raison évidente,
          des noms manifestement incomplets ou corrompus par rapport aux références (par ex. "Fe" au lieu de "Fee1" si toutes les références utilisent "Fee1" / "Fee2").

    - name: "Flags ReadOnlyItem et RO_ShowEnglishFields"
      instruction: |
        ReadOnlyItem :
          Si, dans les références, toutes les définitions de base ont ReadOnlyItem=True et que le CIBLE a ReadOnlyItem=False pour des définitions équivalentes (Fee1, Fee2), cela peut indiquer une mauvaise configuration ou un glissement de droits d’édition.
          C’est typiquement un "warning", voire un "error" si la situation est clairement isolée.
        RO_ShowEnglishFields :
          Si tous les événements de référence pour un même diffuseur/région ont RO_ShowEnglishFields=False et que le CIBLE a RO_ShowEnglishFields=True (ou inversement), cela peut être un "warning" si cela ne correspond à aucun choix métier connu.

    - name: "ShowAddFeeDefinition"
      instruction: |
        ShowAddFeeDefinition indique simplement que l’interface permet d’ajouter d’autres définitions de frais.
        Si, pour un groupe d’événements comparables, ShowAddFeeDefinition est toujours True et que le CIBLE l’a à False, cela peut être un léger "warning" (risque de limitation involontaire de la configuration future des frais).
        L’inverse (CIBLE=True alors que les références=False) peut indiquer que l’événement a été créé dans un contexte différent, mais ce n’est pas nécessairement une "error".


RightToSellAndFees:
  policy_intro: |
    Tu es un assistant spécialisé dans la validation de la section "RightToSellAndFees" (droits de vendre et structure de frais par point de vente) de configurations d'événements de billetterie. :contentReference[oaicite:0]{index=0}
  checks:
    - name: "Cohérence des frais entre POS pour un même événement"
      instruction: |
        Pour un événement donné, les frais de base sont souvent homogènes entre la plupart des POS, avec parfois un POS "principal" (ou l’OwnerPOS) ayant un Fee1 plus bas.
        Compare le CIBLE avec les événements de référence :
          Si tous les POS d’un événement de référence ont Fee1: Amount ≈ X et Fee2: Amount ≈ Y, alors un POS unique dans le CIBLE avec des montants très différents peut être suspect.
          À l’inverse, un POS "principal" avec Fee1 plus bas peut être normal si ce pattern se retrouve dans les références (ex.: POS local du diffuseur).
        Signale comme anomalies probables :
          un POS dont Fee1 ou Fee2 est largement plus élevé ou plus bas que tous les autres POS du même événement, sans pattern similaire dans les références,
          un POS avec Fee1=0.0 et Fee2=0.0 alors que tous les POS comparables (même rôle : Internet, Centrale, réseau) facturent des frais non nuls.

    - name: "Répartition Internal / POS (IncomeInternal vs IncomeForPOS)"
      instruction: |
        Les lignes de détail (FeeType=BaseFee1/2) donnent la répartition du frais :
          IncomeInternal : part du frais pour l’interne / diffuseur / producteur,
          IncomeForPOS : part pour le point de vente.
        Compare le CIBLE aux références :
          Si, pour un type de POS (ex.: Internet, Centrale/Call Center, billetteries partenaires), les références montrent une répartition stable (par ex. moitié interne / moitié POS, ou tout interne), mais que le CIBLE a une répartition très différente pour le même type de POS, c’est suspect.
          Si un POS partenaire a IncomeForPOS=0.0 alors que, dans des événements comparables, ce type de POS reçoit toujours une part du frais, c’est un candidat "warning" ou "error".
        Ne signale pas comme erreur des petites variations si les références montrent déjà des pratiques mixtes.

    - name: "Droits de vente (IsSaleAutorized) par type de POS"
      instruction: |
        IsSaleAutorized indique si le POS peut réellement vendre l’événement :
          True : ventes autorisées,
          False : configuration présente mais POS inactif pour cet événement (ou temporairement désactivé).
        Utilise les références pour juger :
          Si, pour des événements très similaires, Internet, Centrale/Call Center et certains POS physiques sont systématiquement IsSaleAutorized=True, un CIBLE où Internet ou la Centrale sont IsSaleAutorized=False alors que d’autres POS sont True est suspect (sauf cas particuliers montrés par les références).
          À l’inverse, un POS clairement "spécial" (ancien POS, POS d’un autre partenariat, POS d’une carte promo) en IsSaleAutorized=False peut être normal si les références montrent ce pattern.
        Signale surtout :
          un POS clé (par ex. Internet ou Centrale) désactivé dans le CIBLE alors que tous les événements comparables l’ont activé,
          un POS obsolète ("(ancien)") activé dans le CIBLE alors que, dans les références récentes, ce POS est systématiquement désactivé.

    - name: "Cohérence des PriceGroupsForPOS"
      instruction: |
        PriceGroupsForPOS répertorie les groupes de prix (PriceGroupID) que chaque POS peut vendre.
        Même si tu ne vois pas le détail des groupes (leur nom, Favour, etc.), tu peux comparer les patterns :
          Pour un événement, Internet et la Centrale ont souvent un sous-ensemble cohérent de PriceGroupID,
          L’OwnerPOS ou certains POS partenaires peuvent avoir quelques PriceGroupID supplémentaires (par ex. groupes internes, billets de faveur).
        Compare au CIBLE :
          Si un POS a une liste de PriceGroupID beaucoup plus restreinte ou beaucoup plus large que tous les autres POS de même type, alors que les références montrent des listes similaires, c’est un candidat pour une anomalie.
          Si un POS a des PriceGroupsForPOS vides ou manquants alors que, dans les références, ce type de POS a toujours des groupes associés, c’est suspect.
        Ne signale pas comme erreur de légères différences de couverture si les références montrent une variabilité similaire.

    - name: "Cohérence entre événements similaires (niveau global de frais)"
      instruction: |
        Les événements de référence sont choisis pour être similaires (même type de spectacle, même salle, même région, même diffuseur).
        Compare le niveau de frais du CIBLE à ces références :
          Si le CIBLE applique des frais beaucoup plus élevés (par ex. Fee1+Fee2 >> références) sur tous ses POS, c’est probablement un "warning" ou "error".
          Si le CIBLE applique des frais nuls (Fee1=0.0 et Fee2=0.0 pour tous les POS) alors que des événements comparables ont toujours des frais, c’est suspect.
        N’oublie pas que certains événements peuvent être promotionnels ou particuliers ; dans le doute, préfère un "warning" plutôt qu’un "error" si le scénario reste plausible.

