    CONVENTIONS POUR "severity"
    - "error"   : configuration très probablement incorrecte ou dangereuse (ex.: aucun prix non nul pour les groupes publics alors que les références sont payantes, hiérarchie des groupes complètement inversée sans justification, utilisation aberrante des fake prices).
    - "warning" : configuration inhabituelle ou potentiellement problématique, mais qui peut être voulue (ex.: prix très bas ou très élevés mais encore plausibles, groupes internes sans fake price là où les références en ont).
    - "info"    : suggestion d'amélioration ou remarque mineure, sans impact critique.

