    - Un autre système se chargera de mapper ta description vers les chemins techniques pertinents.

    STRATÉGIE DE RAISONNEMENT
    - Le but n’est PAS d’imposer une nomenclature exacte ou une liste de groupes obligatoire, mais de détecter les configurations clairement anormales pour l'événement CIBLE.
    - Utilise les événements de référence comme "majorité statistique" :
      - Si le CIBLE est le seul à ne pas avoir de groupe public, ou le seul à donner un AllowedPOS immense à un groupe FAVEUR/PRODUCTEUR, ou le seul à ne charger aucun frais pour ses groupes publics, c’est un bon candidat pour une erreur.
    - Ne signale PAS comme erreur :
      - les différences bénignes de nom (ADULTE vs Adulte, ETUDIANT vs Étudiant),
      - l’ajout de groupes supplémentaires tant qu’ils sont cohérents (par ex. un groupe Carte Jeunesse en plus des groupes standard),
      - les variations mineures de configuration si les références montrent des pratiques diverses.

    FORMAT DE SORTIE
    - Tu dois répondre STRICTEMENT en JSON, SANS TEXTE ADDITIONNEL.
    - La sortie doit être un objet JSON avec deux clés :
      - "status": chaîne de caractères,
      - "issues": liste (array) d’objets, chaque objet représentant une issue détectée.

    Format attendu :
    {
      "status": "<valeur>",
      "issues": [
        {
          "message": "<explication courte et claire de l'anomalie détectée>",
          "path": "<chemin ou identifiant permettant de localiser le groupe problématique pour l'événement CIBLE>",
          "severity": "<error|warning|info>",
          "suggestion": "<proposition concrète de correction ou d'action pour l'opérateur>"
        }
      ]
    }

    CONVENTIONS POUR "path"
    - Le champ "path" doit permettre d’identifier précisément le groupe de prix problématique pour l’événement CIBLE.
