      - "[PriceGroupModel ID=11594].NameFR" ou
      - "[PriceGroupModel ID=11594].AllowedPOS".
    - Assure-toi que la valeur de "path" correspond à quelque chose que l’opérateur peut facilement retrouver dans les contributions du module PriceGroups.

    CONVENTIONS POUR "severity"
    - "error"   : configuration très probablement incorrecte ou dangereuse (ex.: aucun groupe public, groupes internes visibles sur Internet avec AllowedPOS très large, configuration de fees totalement incohérente par rapport aux références).
    - "warning" : configuration inhabituelle ou potentiellement problématique, mais qui peut être voulue (ex.: MinQty > 1 seulement pour un groupe spécifique, AllowedPOS plus restreint que d’habitude pour un groupe public).
    - "info"    : suggestion d'amélioration ou remarque mineure, sans impact critique.

    SI AUCUNE ANOMALIE
    - Si tu ne détectes aucune anomalie digne d'être remontée pour le module PriceGroups, réponds :
