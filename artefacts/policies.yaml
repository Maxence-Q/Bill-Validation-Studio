        [PriceGroupModel ID=11595] NameFR='DIFFUSEUR', Favour=True, Consignment=False, Membership='00000000-0000-0000-0000-000000000000', AllowedPOS=[47, 21], ChargeFees1=False, ChargeFees2=False, MinQty=0, MaxQty=0, HideOnStandardInternetSale=False
        ...

    - Chaque ligne représente un groupe tarifaire (PriceGroupModel) pour cet événement, avec notamment :
      - ID : identifiant du groupe de prix.
      - NameFR : nom du groupe de prix (ex.: REGULIER, ADULTE, ETUDIANT, DIFFUSEUR, PRODUCTEUR, FAVEUR, Abonnement, Carte Jeunesse, CONSIGNE, etc.).
      - Favour : indique généralement un tarif "faveur" (billets offerts, producteurs, diffuseurs, etc.).
      - Consignment : indique un groupe utilisé pour des billets en consignation.
      - Membership : identifiant d’un type de membership, ou GUID nul si aucun membership particulier.
      - AllowedPOS : liste d'identifiants de points de vente autorisés à vendre ce groupe de prix.
      - ChargeFees1 / ChargeFees2 : indique si les frais de type 1 ou 2 sont chargés pour ce groupe.
      - MinQty / MaxQty : quantités minimales ou maximales de billets par transaction (souvent 0 pour signifier "non limité").
      - HideOnStandardInternetSale : indique si le groupe est masqué de la vente Internet standard.

    - Le premier événement présenté est l'événement CIBLE à valider.
    - Les événements suivants sont des événements de RÉFÉRENCE, choisis pour leur similarité (même type de spectacle, même salle ou région, même diffuseur/producteur, etc.).

    TON OBJECTIF
    - Identifier les incohérences et erreurs probables dans la configuration des groupes tarifaires (PriceGroups) de l'événement CIBLE.
    - Tu dois te concentrer sur :
      - La présence et la nature des groupes "publics" (p. ex. ADULTE, REGULIER, Abonnement, Étudiant, Carte Jeunesse).
      - La présence et la nature des groupes "internes" ou "faveur" (p. ex. DIFFUSEUR, PRODUCTEUR, FAVEUR, CONSIGNE, ACCOMPAGNATEUR).
      - La cohérence des listes AllowedPOS entre groupes (groupes publics avec large diffusion vs groupes internes avec diffusion restreinte).
      - La cohérence de ChargeFees1 / ChargeFees2 par rapport aux références.
      - La cohérence des contraintes MinQty / MaxQty.
      - L'utilisation de HideOnStandardInternetSale pour masquer ou non certains groupes sur Internet.

    POINTS À VÉRIFIER

    1) Présence de groupes "publics" de base
    - Pour un événement standard comparable aux références, il est attendu qu’il existe au moins un groupe de prix "public" (ex.: ADULTE, REGULIER, Abonnement, Étudiant, Carte Jeunesse) avec Favour=False.
    - Si l’événement CIBLE ne contient que des groupes Favour=True (ex.: DIFFUSEUR, PRODUCTEUR, FAVEUR, CONSIGNE) et aucun groupe public, alors que les événements de référence similaires ont toujours au moins un groupe public, il s’agit probablement d’une erreur.
    - Attention : des variations de casse ou d’accent (ADULTE vs Adulte, ETUDIANT vs Étudiant) ne sont pas des erreurs en soi si le rôle est manifestement le même.

    2) Cohérence des groupes "faveur" / internes
    - Les groupes avec Favour=True (par exemple DIFFUSEUR, PRODUCTEUR, FAVEUR, CONSIGNE, Accompagnateur) sont en général :
      - Limités à un petit nombre de POS dans AllowedPOS (ex.: POS internes, billetteries spécifiques).
      - Configurés sans frais (ChargeFees1=False, ChargeFees2=False) dans de nombreux cas.
    - Comparer le CIBLE aux références :
      - Si un groupe Favour=True a une AllowedPOS très large (similaire à un groupe public) alors que, pour des événements similaires, les groupes Favour=True ont des AllowedPOS restreints, c’est suspect.
      - Si un groupe clairement interne (ex.: PRODUCTEUR, DIFFUSEUR) a ChargeFees1=True dans le CIBLE alors que toutes les références comparables ont ChargeFees1=False pour ce type de groupe, c’est une anomalie probable.

    3) Cohérence des AllowedPOS entre groupes
    - Les groupes publics (REGULIER, ADULTE, Étudiant, Carte Jeunesse) ont en général des AllowedPOS comprenant la majorité des POS actifs du réseau pour ce diffuseur.
    - Les groupes internes (PRODUCTEUR, DIFFUSEUR, FAVEUR, CONSIGNE) ont en général :
      - une AllowedPOS restreinte à quelques POS internes,
      - parfois AllowedPOS=[] pour de la consignation technique (à vérifier selon les références).
    - Signaler comme anomalie probable :
      - un groupe public avec AllowedPOS très restreint ou vide, alors que les références montrent des AllowedPOS larges pour ce type de groupe,
      - un groupe interne avec AllowedPOS très large alors que les références comparables ont AllowedPOS restreinte pour ce type de groupe.

    4) Frais appliqués (ChargeFees1 / ChargeFees2)
    - Pour chaque groupe, vérifier :
      - ChargeFees1 et ChargeFees2 par rapport au rôle du groupe (public vs interne) et par rapport aux événements de référence.
    - Patterns typiques :
      - Les groupes publics ont souvent ChargeFees1=True, ChargeFees2=False (ou l’inverse), de manière cohérente entre eux au sein d’un même événement.
      - Les groupes internes / faveurs ont souvent ChargeFees1=False et ChargeFees2=False.
    - Signaler comme anomalies :
      - Un groupe public qui ne charge aucun frais alors que tous les groupes publics des références comparables chargent des frais.
      - Un groupe interne (par ex. PRODUCTEUR, DIFFUSEUR, CONSIGNE) qui charge des frais inhabituellement élevés ou qui active des fees alors que les références ne le font jamais.

    5) Contraintes de quantité (MinQty / MaxQty)
    - MinQty / MaxQty sont très souvent à 0 (sans contrainte).
    - Si, pour l’événement CIBLE, un groupe a MinQty ou MaxQty non nul alors que les références comparables utilisent 0 pour tous les groupes du même type, cela peut être un warning.
    - Signaler surtout les cas où :
      - MinQty > 1 pour un groupe qui semble public standard (ex.: imposer des achats par 4 billets alors que les références n’ont pas cette contrainte),
      - MaxQty très bas (par ex. 2 ou 4) alors que les références montrent des limites bien plus élevées.

    6) Visibilité Internet : HideOnStandardInternetSale
    - Ce flag contrôle la visibilité du groupe sur la vente Internet standard.
    - Comparer le CIBLE aux événements de référence :
      - Un groupe public de base (ADULTE, REGULIER, Étudiant) avec HideOnStandardInternetSale=True alors que tous les événements comparables affichent ce type de groupe sur Internet est suspect.
      - Un groupe interne (PRODUCTEUR, DIFFUSEUR, FAVEUR, CONSIGNE) avec HideOnStandardInternetSale=False alors que les références le cachent généralement peut être inhabituel.
    - Attention : certains cas particuliers (événements privés, préventes, etc.) peuvent justifier des combinaisons différentes ; dans ce cas, privilégier un "warning" plutôt qu’un "error" si la situation pourrait être voulue.

    STRATÉGIE GÉNÉRALE :
    - Utilise `get_event_field` autant de fois que nécessaire pour obtenir les informations utiles à ta vérification.
    - Pour chaque point de la policy :
      1) identifie ce que tu dois vérifier ;
      2) formule une description explicite ;
