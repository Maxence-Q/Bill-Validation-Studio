PriceGroups:

  description: "Définit les catégories de tarifs (Régulier, Étudiant, VIP, etc.) et leurs règles d'application pour un événement."

  attributes:
    ID:
      description: "Identifiant unique du groupe tarifaire."
      validation: "Doit être un entier positif non nul."

    Name / NameFR / NameEN:
      description: "Nom du tarif affiché aux opérateurs et clients."
      context: "Doit être explicite (ex: 'Club Privilège', 'Régulier')."

    AllowedPointOfSales:
      description: "Liste des points de vente autorisés à vendre ce tarif."
      structure:
        PointOfSaleID: 
          description: "ID du guichet ou canal de vente (Web, Guichet physique)."
        EventPriceID:
          description: "Lien vers une matrice de prix spécifique."
          note_to_llm: "Peut être 0. Si 0, le système utilise le prix par défaut du groupe. Ne pas signaler comme erreur sauf si le contexte exige un prix forcé."
        EventPriceGroupID:
          description: "Doit correspondre à l'ID du parent PriceGroup."

    ChargeFees1 / ChargeFees2:
      description: "Booléen indiquant si des frais de service (1 ou 2) s'appliquent."
      validation: "Si True, le champ FeeDefinitionID correspondant (1 ou 2) NE DOIT PAS être un GUID vide (0000...)."

    Fee1DefinitionID / Fee2DefinitionID:
      description: "GUID référençant la règle de calcul des frais."
      context: "Un GUID vide (00000000-0000-0000-0000-000000000000) est valide UNIQUEMENT si ChargeFees est False."

    PossibleFees1 / PossibleFees2:
      description: "Chaîne de caractères informative affichant le montant des frais (ex: '(¤4.00)')."
      validation: "C'est purement visuel. Une incohérence avec ChargeFees est un 'warning', pas une erreur bloquante."

    Favour:
      description: "Indique s'il s'agit d'un tarif de faveur (GRATUIT ou COMP)."
      context: "Si True, le prix final est souvent 0, et les frais sont souvent désactivés (ChargeFees: False)."

    RO_MembershipType:
      description: "Objet Read-Only décrivant l'adhésion requise pour ce tarif."
      validation: "Si MembershipTypeID n'est pas vide, cet objet doit être présent et IsActive doit être True."
      sub_attributes:
        DescriptionFr:
          context: "Texte riche décrivant les avantages. Utile pour vérifier la cohérence marketing."

    RO_EventTSTimeZone:
      description: "Fuseau horaire de l'événement."
      context: "Critique pour valider les dates de vente (SaleStartDate/EndDate). Toutes les dates doivent être interprétées dans ce fuseau."

    IsForPackage:
      description: "Indique si ce tarif est réservé à un forfait."
      validation: "Si True, PackageDealID doit généralement être > 0."

  global_rules:
    - "Un PriceGroup doit avoir au moins un AllowedPointOfSales actif pour être vendable."
    - "Les champs commençant par 'RO_' sont informatifs (Read Only) et ne doivent pas être validés pour modification, mais utilisés comme contexte."



Prices:

  description: "Détail des prix appliqués pour chaque section de la salle, liés à un groupe tarifaire parent."

  attributes:
    Price.ID:
      description: "Identifiant unique de l'entrée de prix en base de données."
      validation: "Doit être un entier > 0. Si 0, c'est une erreur critique d'intégrité."

    Price.SectionID:
      description: "Identifiant de la section de la salle (ex: Balcon, Parterre)."
      validation: "Doit être > 0. Une liaison à la section 0 est invalide pour un prix spécifique."

    Price.Price:
      description: "Montant de base du billet hors taxes."
      context: 
        - "Peut être 0.00 SI le PriceGroup parent a 'Favour: True' (billet de faveur/gratuité)."
        - "Peut être 0.00 SI le champ 'Hidden' est True."
        - "Sinon, un prix de 0.00 doit générer un AVERTISSEMENT (Warning)."

    Tax1Rate / Tax2Rate:
      description: "Taux de taxation applicable (ex: 0.05 pour 5%)."
      validation: "Doit correspondre aux taux en vigueur pour l'événement (généralement fixes)."

    Tax1Amount / Tax2Amount:
      description: "Montant monétaire de la taxe calculée."
      validation: 
        rule: "Mathématique simple"
        formula: "Doit être approximativement égal à Price * Rate."
        tolerance: "Accepter un écart de ±0.01 ou ±0.02 dû aux arrondis."
        note_to_llm: "Si l'écart est > 0.05, c'est une ERREUR."

    ServiceFeesTotal:
      description: "Total des frais de service inclus ou ajoutés."
      context: "Vérifier la cohérence avec les champs 'ChargeFees' du PriceGroup parent. Si le parent ne facture pas de frais, ce montant devrait idéalement être 0."

    EventPrintPriceID:
      description: "Référence pour l'impression du prix sur le billet physique."
      note_to_llm: "Peut être 0 (valeur par défaut)."

    FakePriceToShowOnTicket:
      description: "Prix 'cosmétique' imprimé sur le billet (souvent utilisé pour masquer le prix réel sur des billets promo)."
      context: "Si 'FakePriceOnTicket' est True, ce montant doit être > 0."

    IsRealPricePresent:
      description: "Indicateur technique de présence d'un prix."
      validation: "Si False, le prix est considéré comme non défini ou hérité."

  global_rules:
    - "Un 'MainPrice' définit le prix par défaut. Les entrées dans la liste 'Prices[]' sont des surcharges ou spécificités par section."
    - "Si un PriceGroup est marqué 'InternetDefault: True', il est suspect d'avoir des prix à 0.00 sans que ce soit des faveurs."





RightToSellAndFees:

  description: "Définit les droits de vente (qui peut vendre) et la structure détaillée des frais (Frais de service + Taxes) pour chaque point de vente."

  attributes:
    EventPointOfSale.IsSaleAutorized:
      description: "Interrupteur principal autorisant la vente pour ce point de vente."
      validation: "Si False, les incohérences de frais sont moins graves. Si True, les frais DOIVENT être cohérents."

    # --- Validation des Frais de Base ---
    FeeAmount (Fee1 / Fee2):
      description: "Montant total du frais facturé au client (hors taxes ou TTC selon config)."
      validation: "Doit être la somme de IncomeInternal + IncomeForPOS (à une tolérance près)."

    IncomeInternal:
      description: "Partie du frais revenant à l'organisateur/producteur."
      context: "Si IsSaleAutorized=True, il est suspect que IncomeInternal ET IncomeForPOS soient tous les deux à 0.00 alors que FeeAmount > 0."

    IncomeForPOS:
      description: "Partie du frais conservée par le point de vente (distributeur)."

    # --- Validation Fiscale ---
    TaxRates (Tax1Rate / Tax2Rate):
      description: "Taux de taxation (ex: 0.05 pour TPS, 0.09975 pour TVQ)."
      validation: "Comparer avec les taux standards connus (RAG). Une variation non standard est une erreur."

    TaxAmounts (FeeTax1 / FeeTax2):
      description: "Montant monétaire de la taxe."
      validation:
        rule: "Calcul fiscal"
        formula: "FeeAmount * TaxRate"
        tolerance: "0.01 (pour gérer les arrondis comptables)."
        action: "Signaler en ERREUR si l'écart dépasse la tolérance."

    # --- Cohérence Résumé vs Détail ---
    EventPointOfSale vs RightToSellFees:
      description: "EventPointOfSale contient les totaux, RightToSellFees contient le détail."
      validation: "Les montants dans l'entête (EventPointOfSale.Fee1Amount) DOIVENT être identiques aux montants dans la liste de détail (RightToSellFees.FeeAmount)."

    # --- Champs Système ---
    RO_FeeAmountTotal:
      description: "Champ calculé (Read Only) affichant le total théorique."
      validation: "Doit correspondre à la somme (Fee1 + Taxes + Fee2 + Taxes). Si différent, signaler 'Désynchronisation des données'."

  global_rules:
    - "L'argent ne doit pas disparaître : FeeAmount doit être entièrement distribué entre Internal et POS (sauf si configuré en 'Surplus')."
    - "Un taux de taxe (Rate) ne doit jamais être appliqué sur un montant à 0, et un montant > 0 doit généralement avoir des taxes si le taux est > 0."