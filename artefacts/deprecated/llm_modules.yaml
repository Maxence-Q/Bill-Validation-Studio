version: 1
orchestration:
  # Ordre conseillé d’exécution des sous-modules (avant l’orchestrateur final)
  execution_order:
    - temporalite
    - plan_capacite
    - tarifs_client
    - pos_frais
    - internet
    - forfaits_produits
    - ids_tags
    - final_validation

modules:
  temporalite:
    title: "Temporalité"
    rules: ["RULE01","RULE02","RULE03","RULE04"]
    stage_hint: 2
    description: "Dates, fenêtres de vente, formats ISO, flags de temporalité."

  plan_capacite:
    title: "Plan/Capacité"
    rules: ["RULE10","RULE11"]
    stage_hint: 1
    description: "Capacité officielle, régie bloquée, sections tarifées vs actives."

  internet:
    title: "Internet"
    rules: ["RULE20","RULE21"]
    stage_hint: 7
    description: "Affichage public FR/EN, contenu cohérent, pas de lorem ipsum."

  tarifs_client:
    title: "Tarifs (+ Client)"
    rules: ["RULE40","RULE41","RULE42","RULE43","RULE44","RULE45","RULE60","RULE61"]
    stage_hint: 3
    description: "Groupes de prix, taxes, GA vs sections, cas Co-Motion/Club."

  pos_frais:
    title: "POS/Frais"
    rules: ["RULE50","RULE51","RULE52","RULE53"]
    stage_hint: 5
    description: "Droits de vente par canal, POS requis, synchronisation d’ouvertures."

  forfaits_produits:
    title: "Forfaits/Produits"
    rules: ["RULE70"]
    stage_hint: 1
    description: "Cohérence des forfaits/passeports/produits liés."

  ids_tags:
    title: "IDs/Tags"
    rules: ["RULE80","RULE81","RULE82"]
    stage_hint: 2
    description: "GUID non par défaut, concordance IDChain, tags publics/internes."

  final_validation:
    title: "Validation finale (orchestrateur)"
    # L’orchestrateur exécute tous les modules ci-dessus + ces règles transversales :
    rules: ["RULE30","RULE94"]
    depends_on:
      - temporalite
      - plan_capacite
      - tarifs_client
      - pos_frais
      - internet
      - forfaits_produits
      - ids_tags
    stage_hint: 6
    description: "Simulation d’achat (régulier/membre) + warnings optionnels."
