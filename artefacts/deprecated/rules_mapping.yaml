version: 1
defaults:
  max_list_items: 5
  redact_html_fields: true   # évite d’inonder le prompt avec du HTML riche (LongDescription)
  truncate_text_at: 300

groups:
  - id: temporalite
    title: "Règles Temporalité & Flags (01–04)"
    module: temporalite
    include_paths:
      - "Event.Event.IsInSale"
      - "Event.Event.HasNoSpecificDate"
      - "IDChain.TimeZoneID"
      - "Timezone.TZDatabaseID"
      - "EventDates.EventDateModelList[].Date"
      - "EventDates.EventDateModelList[].SalesStartDateBoxOffice"
      - "EventDates.EventDateModelList[].SalesEndDateBoxOffice"
      - "EventDates.EventDateModelList[].SalesStartDateNetwork"
      - "EventDates.EventDateModelList[].SalesEndDateNetwork"
      - "EventDates.EventDateModelList[].SalesStartDateInternet"
      - "EventDates.EventDateModelList[].SalesEndDateInternet"
    computed:
      - name: "per_channel_windows_ok"
        kind: "temporal_check"   # ouverture < fermeture ≤ Date ; TZ uniforme
        inputs:
          date_path: "EventDates.EventDateModelList[].Date"
          channels:
            - start: "SalesStartDateBoxOffice"
              end:   "SalesEndDateBoxOffice"
            - start: "SalesStartDateNetwork"
              end:   "SalesEndDateNetwork"
            - start: "SalesStartDateInternet"
              end:   "SalesEndDateInternet"
          tz_path: "Timezone.TZDatabaseID"
      - name: "isin_sale_consistency"
        kind: "flag_vs_windows_now"
        inputs:
          is_in_sale_path: "Event.Event.IsInSale"
          windows_on: "EventDates.EventDateModelList[]"
          now_source: "system"   # l’extracteur insérera l’heure courante en UTC
    compare_to_similar:
      keys:
        - "Event.Event.RepresentationTypeId"
        - "Event.Event.ProducerID"
      metrics:
        - "median_sales_window_days"
        - "common_sales_channels"

  - id: plan_capacite
    title: "Règles Plan & Capacité (10–11)"
    module: plan_capacite
    include_paths:
      - "Event.Event.VenueModelId"
      - "Event.Event.IsGeneralAdmission"
      - "Event.Event.TicketLimitNumber"     # jauge côté Event
      - "IDChain.VenueModelID"
      - "OwnerPOS.Name"
    computed:
      - name: "capacity_ok_vs_official"
        kind: "capacity_compare"
        inputs:
          configured_capacity_path: "Event.Event.TicketLimitNumber"
          api: "venue_capacity_api"         # hook pour appel REST interne plan officiel
      - name: "sections_active_vs_tarifees"
        kind: "sections_alignment"
        inputs:
          api: "venue_sections_api"
    compare_to_similar:
      keys: ["IDChain.VenueModelID"]

  - id: internet
    title: "Règles Internet & FR/EN (20–21)"
    module: internet
    include_paths:
      - "Event.Event.DisplayOnTheInternet"
      - "Event.Event.InternetName_Fr"
      - "Event.Event.InternetName_En"
      - "Event.Event.LongDescription_Fr"
      - "Event.Event.LongDescription_En"
    computed:
      - name: "fr_en_pairs_ok"
        kind: "fr_en_required_when_display"
        inputs:
          flag_path: "Event.Event.DisplayOnTheInternet"
          fields:
            - ["InternetNameFR", "InternetNameEN"]
            - ["LongDescriptionFR", "LongDescriptionEN"]
      - name: "no_lorem_no_contradiction"
        kind: "content_sanity"
        inputs:
          fields: ["LongDescriptionFR", "LongDescriptionEN"]

  - id: tests_de_vente
    title: "Règles Tests de vente (30)"
    module: final_validation
    include_paths:
      - "Event.Event.IsInSale"
      - "PriceGroups.PriceGroupModelList[].AllowedPointOfSales[].PointOfSaleID"
      - "PriceGroups.PriceGroupModelList[].MembershipTypeID"
    computed:
      - name: "can_buy_regular"
        kind: "simulate_checkout"
        inputs: { mode: "regular" }
      - name: "can_buy_member"
        kind: "simulate_checkout"
        inputs: { mode: "member" }

  - id: prix_groupes_sections
    title: "Règles Prix/Groupes/Sections (40–45)"
    module: tarifs_client
    include_paths:
      - "PriceGroups.PriceGroupModelList[].NameFR"
      - "PriceGroups.PriceGroupModelList[].Favour"
      - "PriceGroups.PriceGroupModelList[].Consignment"
      - "PriceGroups.PriceGroupModelList[].AllowedPointOfSales[].PointOfSaleID"
      - "PriceGroups.PriceGroupModelList[].ChargeFees1"
      - "PriceGroups.PriceGroupModelList[].ChargeFees2"
      - "PriceGroups.PriceGroupModelList[].Fee1DefinitionID"
      - "PriceGroups.PriceGroupModelList[].Fee2DefinitionID"
      # si noeud Prices détaillant les montants, ajouter les chemins ici
    computed:
      - name: "price_zero_requires_reason"
        kind: "price_zero_policy"
      - name: "ga_vs_sections_structure"
        kind: "ga_vs_sections"
        inputs:
          is_ga_path: "Event.Event.IsGeneralAdmission"
          api: "venue_sections_api"
      - name: "tax_mix_consistency"
        kind: "tax_mix_check"

  - id: pos_frais
    title: "Règles Frais/POS (50–53)"
    module: pos_frais
    include_paths:
      - "PriceGroups.PriceGroupModelList[].AllowedPointOfSales[].PointOfSaleID"
      - "OwnerPOS.ID"
      - "OwnerPOS.Name"
    computed:
      - name: "pos_required_present"
        kind: "pos_required"
        inputs:
          required: ["Guichet", "Reservatech Admin"]
      - name: "pos_opening_alignment"
        kind: "pos_opening_compare"
        inputs:
          dates_from: "EventDates.EventDateModelList[]"

  - id: client_specifique
    title: "Règles Client Spécifiques (60–61)"
    module: tarifs_client
    include_paths:
      - "PriceGroups.PriceGroupModelList[].RO_MembershipType.NameFr"
      - "PriceGroups.PriceGroupModelList[].MembershipTypeID"
    computed:
      - name: "co_motion_membership_enforced"
        kind: "membership_required_when_keyword"
        inputs:
          keyword: "club comotion"

  - id: forfaits_produits
    title: "Règles Forfaits/Produits liés (70)"
    module: forfaits_produits
    include_paths:
      - "PriceGroups.IsPackage"
      - "PriceGroups.PackageID"
      - "Event.Event.ProductType"
    computed:
      - name: "bundles_coherence"
        kind: "bundle_check"

  - id: ids_tags
    title: "Règles Identifiants/Tags (80–82)"
    module: ids_tags
    include_paths:
      - "Event.Event.ProductGUID"
      - "Event.Event.SalesRevenueGLAccountID"
      - "Event.Event.RoyaltyGLAccountID"
      - "IDChain.*"
      - "Event.Event.InternalTags"
      - "Event.Event.PublicTags"
    computed:
      - name: "no_default_guids"
        kind: "guid_non_default"
      - name: "idchain_matches_event"
        kind: "idchain_consistency"

  - id: warnings_optionnels
    title: "Rappels/Optionnels (94)"
    module: final_validation
    include_paths:
      - "OwnerPOS.EventReminderEnabled"
      - "OwnerPOS.EventReminderDaysBefore"
    computed:
      - name: "optional_fields_present"
        kind: "warning_optional"
        inputs:
          fields: ["EventReminderEnabled", "EventReminderDaysBefore"]

rules:  # surcouche fine par règle spécifique
  RULE01:
    from_group: temporalite
    module: temporalite
    emphasize:
      - "EventDates.EventDateModelList[].SalesStartDate*"
      - "EventDates.EventDateModelList[].SalesEndDate*"
      - "EventDates.EventDateModelList[].Date"
  RULE10:
    from_group: plan_capacite
    module: plan_capacite
    emphasize: ["Event.Event.TicketLimitNumber", "IDChain.VenueModelID"]
  RULE20:
    from_group: internet
    module: internet
    emphasize: ["Event.Event.DisplayOnTheInternet","Event.Event.InternetNameFR","Event.Event.InternetNameEN"]
  RULE52:
    from_group: frais_pos
    module: pos_frais
    emphasize: ["PriceGroups.PriceGroupModelList[].AllowedPointOfSales[]"]
