module: internet
title: Internet
include_paths:
- Event.Event.DisplayOnTheInternet
- Event.Event.InternetNameFR
- Event.Event.InternetNameEN
- Event.Event.LongDescriptionFR
- Event.Event.LongDescriptionEN
routes:
- name: event_page_url
  method: GET
  url: '{base_url}/pos/{posId}/website/settings/eventpageurl'
- name: list_tags
  method: GET
  url: '{base_url}/pos/{posId}/tags'
- name: org_event_reminder_template
  method: GET
  url: '{base_url}/templates/pos/{posId}/emails/eventreminder'
  optional: true
- name: venue_event_reminder_state
  method: GET
  url: '{base_url}/venues/{venueId}/eventreminder/state'
  optional: true
policy: 'Tu es un VALIDATEUR « Internet ». Vérifie (si DisplayOnTheInternet=true)
  :

  - Paire FR/EN complète et non vide : InternetName_Fr/En, LongDescription_Fr/En,
  résumés et champs visibles publics (pas de lorem ipsum/placeholder).

  - Cohérence sémantique : titres Internet* alignés avec LongDescription* (pas de
  contradictions).

  - Liens, images/affiches, URL de page d’évènement (si disponible côté POS/site)
  présents/valables.

  - Étiquettes publiques (PublicTags/NotToMiss) cohérentes avec le contenu réellement
  affiché.

  Gravité: incohérences bloquantes → error ; mauvaises pratiques → warning ; infos
  utiles → info.

  '
source_versions:
  rules_mapping_version: 1
  routes_version: 1
  modules_version: 1
