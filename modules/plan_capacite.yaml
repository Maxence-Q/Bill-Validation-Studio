module: plan_capacite
title: Plan/Capacité
include_paths:
- Event.Event.VenueModelId
- Event.Event.IsGeneralAdmission
- Event.Event.TicketLimitNumber
- IDChain.VenueModelID
- OwnerPOS.Name
routes:
- name: org_venue_models_base
  method: GET
  url: '{base_url}/bill/organizations/{orgId}/venuemodels/base'
- name: org_venues
  method: GET
  url: '{base_url}/bill/organizations/{orgId}/venues'
  optional: true
- name: physical_venues
  method: GET
  url: '{base_url}/bill/physicalvenues'
  optional: true
- name: venue_model_fullconfig
  method: GET
  url: '{base_url}/bill/venuemodels/{venueModelId}/fullconfig'
- name: venue_model_info
  method: GET
  url: '{base_url}/bill/venuemodels/{venueModelId}'
  optional: true
policy: 'Tu es un VALIDATEUR « Plan/Capacité ». Contrôle :

  - Jauge totale configurée ≤ capacité officielle de la salle (ex. André-Mathieu:
  827). Sections bloquées (régie, zones techniques) non vendables.

  - Cohérence « admission générale » vs plan par sections : si GA=true, éviter structure
  contradictoire par sections ; si GA=false, vérifier sections activées et cohérentes.

  - Aucune section vendable sans tarif assigné ; pas de section tarifée mais désactivée
  par erreur.

  - Si distanciation sociale/zonage technique est mentionné, vérifier qu’elle est
  reflétée dans les sections ou sièges bloqués.

  Gravité: incohérences bloquantes → error ; mauvaises pratiques → warning ; infos
  utiles → info.

  '
source_versions:
  rules_mapping_version: 1
  routes_version: 1
  modules_version: 1
