module: ids_tags
title: IDs/Tags
include_paths:
- Event.Event.ProductGUID
- Event.Event.SalesRevenueGLAccountID
- Event.Event.RoyaltyGLAccountID
- IDChain.*
- Event.Event.InternalTags
- Event.Event.PublicTags
routes:
- name: list_tags
  method: GET
  url: '{base_url}/pos/{posId}/tags'
  optional: true
policy: 'Tu es un VALIDATEUR « IDs/Tags ». Vérifie :

  - Pas de GUID/ID par défaut (00000000-0000-0000-0000-000000000000 ou 0) sur des
  entités requises.

  - Concordance des chaînes internes RO_* et IDChain avec les méta-données Event.*.

  - Cohérence des tags publics (PublicTags/NotToMiss) et internes (InternalTags) avec
  l’état de publication.

  Gravité: incohérences bloquantes → error ; mauvaises pratiques → warning ; infos
  utiles → info.

  '
source_versions:
  rules_mapping_version: 1
  routes_version: 1
  modules_version: 1
