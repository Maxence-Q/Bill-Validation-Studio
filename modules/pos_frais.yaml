module: pos_frais
title: POS/Frais
include_paths:
- PriceGroups.PriceGroupModelList[].AllowedPointOfSales[].PointOfSaleID
- OwnerPOS.ID
- OwnerPOS.Name
routes:
- name: list_organizations_points_of_sale
  method: GET
  url: '{base_url}/bill/organizations'
- name: list_taxes
  method: GET
  url: '{base_url}/bill/taxes'
- name: event_page_url
  method: GET
  url: '{base_url}/pos/{posId}/website/settings/eventpageurl'
- name: list_tags
  method: GET
  url: '{base_url}/pos/{posId}/tags'
  optional: true
policy: 'Tu es un VALIDATEUR « POS/Frais ». Vérifie :

  - Droits et canaux actifs (web, guichet, admin) alignés avec la stratégie/contrat
  : vente internet active si prévu ; guichet présent si requis.

  - Frais (FeeDefinitions) présents et marqués taxable/non-taxable conformément au
  client.

  - Cas client ROR : frais 1 non taxable et frais 2 taxable (inverser = erreur).

  - Incohérences : promo active alors que canal correspondant est inactif ; dates
  d’ouverture non synchronisées si exigée l’ouverture simultanée.

  Gravité: incohérences bloquantes → error ; mauvaises pratiques → warning ; infos
  utiles → info.

  '
source_versions:
  rules_mapping_version: 1
  routes_version: 1
  modules_version: 1
