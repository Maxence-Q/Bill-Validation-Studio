module: tarifs_client
title: Tarifs (+ Client)
include_paths:
- PriceGroups.PriceGroupModelList[].NameFR
- PriceGroups.PriceGroupModelList[].Favour
- PriceGroups.PriceGroupModelList[].Consignment
- PriceGroups.PriceGroupModelList[].AllowedPointOfSales[].PointOfSaleID
- PriceGroups.PriceGroupModelList[].ChargeFees1
- PriceGroups.PriceGroupModelList[].ChargeFees2
- PriceGroups.PriceGroupModelList[].Fee1DefinitionID
- PriceGroups.PriceGroupModelList[].Fee2DefinitionID
routes:
- name: list_taxes
  method: GET
  url: '{base_url}/bill/taxes'
- name: promo_rules
  method: GET
  url: '{base_url}/bill/promorules'
  optional: true
- name: promo_definitions
  method: GET
  url: '{base_url}/bill/promodefinitions'
  optional: true
- name: promo_codes_for_definition
  method: GET
  url: '{base_url}/bill/promodefinitions/{promoDefinitionId}/promocodes'
  optional: true
- name: presale_pricegroups
  method: GET
  url: '{base_url}/bill/presales/{presaleId}/pricegroups'
  optional: true
policy: 'Tu es un VALIDATEUR « Tarifs ». Contrôle :

  - Existence de PriceGroups ; champs obligatoires (nom, type, taxes, AllowedPointOfSales
  plausibles).

  - Pas de mélange incohérent de taxes pour un même groupe/section (tout taxable ou
  tout non-taxable selon la règle).

  - Prix à 0 uniquement si faveur/promo/comp clairement indiquée ; si "Invité" ou
  "faveur" dans le nom → flag faveur activé ; si "consigne" dans le nom → cocher consigne,
  prix=0 et "Prix différent sur billet" renseigné.

  - GA vs sections : si GA=true, affectations tarifaires cohérentes ; sinon, chaque
  section vendable doit avoir un tarif.

  - Cas client Co-Motion : si le nom contient "club comotion", exiger la carte membre
  liée au tarif membre.

  - Éviter l’erreur fréquente : prix de salle écrasé par prix de section (signaler
  incohérence).

  Gravité: incohérences bloquantes → error ; mauvaises pratiques → warning ; infos
  utiles → info.

  '
source_versions:
  rules_mapping_version: 1
  routes_version: 1
  modules_version: 1
